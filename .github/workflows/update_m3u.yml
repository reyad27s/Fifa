name: Update FIFA M3U Playlist

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ১ ঘণ্টা পর পর রান হবে (UTC সময় অনুযায়ী)
  workflow_dispatch: # চাইলে আপনি নিজেও ম্যানুয়ালি বাটনে ক্লিক করে রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # গিটহাবে ফাইল পুশ করার অনুমতি

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add fifa.m3u
        # ফাইল পরিবর্তন হলেই কেবল কমিট করবে, নাহলে এরর এড়াবে
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update fifa.m3u [skip ci]" && git push)
